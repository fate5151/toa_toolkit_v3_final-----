credits.body=原始配乐由 A Complete Spiral 创作 (www.acompletespiral.com)\n向官方贡献者 Dern 的程序设计、调试和支持致以巨大感谢！\n\n帮助实现这一点的魅魔级赞助者：\nDarksideX, JennaTran, Joel Fields, Laersect，并特别感谢 crufl 和 Ace 的精神支持、建议和友谊！爱你们俩！\n也特别感谢 NobleIntentions 和 UpsideDownArbys 倾听 Maj 的挫折！\n\n由 T3mp3st, Legion, Fattycakes 和其他匿名人士进行编辑校对和试玩测试\n也感谢我们所有的赞助者，是你们让这一切成为可能！
outcome_text.knot_oral.wereslut=它卡在你牙齿后面。你的嘴被灌满了！
outcome_text.knot_oral=你被当面灌满了！
outcome_text.knot_anal.wereslut=你被结锁了！！！\n你现在受她摆布了。
outcome_text.knot_anal.spider=你被灌满了蛋。
outcome_text.knot_anal.quetzal=女神的精液让你的肚子疼痛地鼓胀起来！
outcome_text.knot_anal=你的屁股被灌满了。
outcome_text.satisfied.mermaid=你即将把精液射进美人鱼的蛋里！
outcome_text.satisfied.centaur=你被半人马巨大的马屌征服了。
outcome_text.satisfied.ogre=食人魔用他的食人魔精液填满了你的肠道。你被彻底操透了。
outcome_text.submission.mermaid=你没办法把美人鱼从你身上弄下来！她要把你榨干！
outcome_text.submission.angel=她坐在你脸上，怎么都甩不掉—你已经无法再战斗了！
outcome_text.submission=他们被彻底干傻了！已经不再有敌意了。
outcome_text.death.naga=你被压扁了！
outcome_text.pacifist.angel=她注意到你缺乏攻击性，于是停了下来。
outcome_text.pacifist=你安抚了敌人！
outcome_text.surrender=你跪下投降，他们停止了敌对行动。
outcome_text.rescue_urka=你跪下投降，乌尔卡介入干预。
outcome_text.rescue_alma=你跪下投降，阿尔玛介入阻止。
outcome_text.drunk=你醉得太厉害，没法继续了！
outcome_text.drunk_other=他们醉得太厉害，没法继续了！
outcome_text.groin_kick=哎哟。
outcome_text.satisfied={Nom0}似乎满足了。{Nom0}不再有敌意。
mutation.cowgirl_grapple_disadvantage.1=它还卡在你体内！
mutation.cowgirl_grapple_disadvantage.2=好吧，我猜你已经知道了。
mutation.cowgirl_grapple_disadvantage.3=有点像后穴压碎机。
mutation.cowgirl_grapple_scramble=很难骑在它们上面！
mutation.cowgirl_grapple_advantage=它们要把你甩下来了！
battle.dialog.woof_woof=「汪！汪！」
battle.message.cold_puts_them_to_sleep=寒冷让它们陷入安眠！
battle.ass_fullness.looks_pregnant=它们的肚子看起来像怀孕了，灌满了婴儿糊！从它们被用烂的穴里流出来！动作迟缓！-2 敏捷。
battle.ass_fullness.gut_stuffed=它们的肠道灌满了精液！流出来了！它们恶心到走不快！-1 敏捷。
battle.ass_fullness.cum_runs_out_of_full_ass=精液从他们满盈的后穴里流出来！
battle.ass_fullness.they_drool_cum_from_their_hole=他们从穴里淌出精液！
battle.ass_fullness.last_of_the_cum_runs_out_of_their_hole=最后一点精液从他们的穴里流出来！
battle.drool.they_vomit_tremendous_load_onto_ground=他们把一大股精液吐到地上！
battle.drool.they_spew_massive_load_onto_ground=他们把一大股精液喷到地上！
battle.drool.they_spit_all_of_the_cum_in_mouth_onto_ground=他们把嘴里所有的精液都吐到地上！
