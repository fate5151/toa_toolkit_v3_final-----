technique.power_attack.flavor_text=强力而自信的下劈。对倒地敌人使用时效果致命。
technique.tempo_attack.flavor_text=追击技，用于延续攻击的势头。使对手保持防御姿态。
technique.spring_attack.flavor_text=突然的侵略性打击以发起进攻。注意你的立足点。
technique.blitz_attack.flavor_text=灵巧的一击，为一次极其凶猛的攻击做准备。发动前务必站稳脚跟。
technique.all_out_blitz.flavor_text=继续突击，利用势头和恰到好处的步法，从一次打击无缝过渡到下一次。
technique.change_up.flavor_text=一种高级攻击，保持进攻姿态，可能打乱对手的节奏。
technique.hold_back.flavor_text=结束闪电突击，让使用者进入一个侵略性较低但仍具攻击性的姿态
technique.reserved_attack.flavor_text=结束攻击，回到一个更平衡的姿态，可根据需要应对敌人
technique.advance.flavor_text=从防御姿态突然转为进攻，有多种后续选项
technique.neutral_attack.flavor_text=普通的下劈攻击，又弱又明显，但依然有效
technique.careful_attack.flavor_text=一次不会降低防御的打击，有助于保持防御选项
technique.block.flavor_text=平衡的防御动作，允许使用者过渡到更易防守的位置
technique.guard.flavor_text=专注的防御动作，使用所有可用工具来抵御对手的攻击
technique.second_wind.flavor_text=使用者放下手臂，放松姿势以喘口气，恢复体力。
technique.sudden_advance.flavor_text=一种不稳定的技巧—使用者在积极招架对手的同时，迅速从防御姿态转为进攻姿态。
technique.chant.flavor_text=用盾牌防御，同时尝试抽取少量魔力。
technique.riposte.flavor_text=一种反击技巧，能够招架对手的攻击并以自己的攻击进行反击。敌人越可预判，反击就越具毁灭性。
technique.disarm.flavor_text=一种反击技巧，能够缴械、招架并反击对手，尤其是较慢或可预判的对手，同时让你处于发起进攻的位置。
technique.trip.flavor_text=一种尝试利用对手的动量来绊倒他们的技巧。
technique.en_garde.flavor_text=一种主动招架，用于格挡对手的攻击。
technique.armor_sunder.flavor_text=一种最大化对敌人护甲造成伤害的打击。
technique.cautious_attack.flavor_text=一种巧妙的打击，在使用时能防御自身，并让使用者处于良好位置以防御反击。
technique.vault.flavor_text=一种以良好姿势将使用者发射到空中的技能。
technique.jump_attack.flavor_text=来自空中的强力打击。
technique.vault_over.flavor_text=利用动量，使用者跃过对手的攻击。
technique.reckless_attack.flavor_text=一种无法预判的强力攻击，会使使用者失去平衡，但无法被格挡。
technique.knock_down.flavor_text=一种旨在将对手撞倒在地的猛冲攻击。
technique.slide.flavor_text=扫腿攻击，可能将对手击倒，同时避开他们的攻击。
technique.taunt.flavor_text=一个开场挑逗动作，撩拨着接下来的情色动作。
technique.hit_the_deck.flavor_text=一个主动闪避，将使用者摔到地上。
technique.feint_and_strike.flavor_text=一次佯攻加攻击，除非使用者相当熟练，否则会失去平衡。
technique.parry.flavor_text=一个主动招架，用于格挡对手的攻击。
technique.uppercut.flavor_text=从低处发起、击中高处的攻击。
technique.slap_ass.flavor_text=调皮地拍打臀部，引诱某人来试一试。
technique.gesture.flavor_text=一种下流、暗示性的手势。
technique.pucker_lips.flavor_text=用嘴唇发出的邀请。
technique.rub.flavor_text=一些旨在挑逗他人的自慰动作。
technique.blow_me.flavor_text=明确表示你希望别人用嘴唇含住你的肉棒。
technique.present.flavor_text=一种简单但有效的勾引技巧：摆好姿势。
technique.pound.flavor_text=直截了当的屁股猛插。
technique.lube_cock.flavor_text=给你的肉棒涂上润滑液找点乐子。
technique.lube_ass.flavor_text=给自己的屁股涂上润滑油，找点乐子。
technique.drop_pants.flavor_text=把你的裤子或内裤脱到地上。
technique.lube_up.flavor_text=给对手的穴涂上润滑油，找点乐子。
technique.spit_on_hole.flavor_text=用口水把对手的警长星星擦亮。
technique.slow_fuck.flavor_text=缓慢而温柔的操弄。
technique.ass_blast.flavor_text=一种疯狂的操屁股技巧，包括扯头发。
technique.crush_ass.flavor_text=一种直抵卵蛋深处、掏肠掘肚的动作。
technique.prostate_grind.flavor_text=一种高级技巧，旨在让受技者精液狂喷不止。
technique.pound_prone_bone.flavor_text=把受技者的屁股压扁在地。
technique.irrumatio.flavor_text=直截了当的口腔操干。
technique.force_deepthroat.flavor_text=深喉口交。
technique.grab_it.flavor_text=用来抓住敌人的……嗯，你懂的。
technique.step_on_it.flavor_text=用来踩住敌人的……嗯，你懂的。
technique.center.flavor_text=集中精神稳定自身，准备推进并发动攻击。
technique.inner_focus.flavor_text=集中精神，稳住自己，伺机出击。
technique.ashi.flavor_text=蓄势待发，利用对手的规律性来占得优势。
technique.stonewall.flavor_text=进入完全防御姿态，无法攻击，但难以受伤。
technique.berserk.flavor_text=陷入盲目狂暴的怒火，愤怒被淬炼成一把双刃剑。
technique.reel_back.flavor_text=准备以惊人的气势打出一记重拳。
technique.withdraw.flavor_text=拉开你与对手之间的距离。
technique.lock.flavor_text=尝试通过蛮力压制对手，瞬间赢得擒抱。
technique.yoink.flavor_text=把挡住他们洞口的东西拉开。
technique.yoink_oral.flavor_text=把挡住他们嘴巴的东西拉开。
technique.combat_heal.flavor_text=当更复杂的仪式来不及快速奏效时，可以施放的简易自愈法术。
technique.true_heal.flavor_text=由真正的法师施放的自愈法术。
technique.ultra_heal.flavor_text=由真正的法师通过深度咏唱施放的自愈仪式法术。
technique.combat_fire.flavor_text=在近距离战斗炽烈时容易施放的召唤火焰法术。
technique.true_fire.flavor_text=由真正的法师施放的召唤火焰法术。
technique.ultra_fire.flavor_text=强大的法师以深沉咏唱施展的壮观召唤火焰仪式法术。
technique.combat_frost.flavor_text=在近身战斗的拥抱中容易施放的召唤冰寒法术。
technique.true_frost.flavor_text=真正的法师施展的召唤冰寒法术。
technique.ultra_frost.flavor_text=强大的法师以深沉咏唱施展的封冻召唤冰寒仪式法术。
technique.combat_shock.flavor_text=快速施放的容易召唤雷电法术，不过离目标太近的法师将遭厄运！
technique.true_shock.flavor_text=真正的法师施展的召唤雷电法术。
technique.ultra_shock.flavor_text=强大的法师以深沉咏唱施展的令人敬畏的召唤雷电仪式法术。
technique.warmth.flavor_text=一个简单的法术，能为施法者取暖。
technique.cool.flavor_text=一个简单的法术，能为施法者降温。
technique.titan_strength.flavor_text=召唤泰坦之力注入使用者体内。
technique.weakening_curse.flavor_text=一个诅咒对手的法术，使其变得虚弱无力。
technique.gravity.flavor_text=一个诅咒对手的法术，使其变得格外沉重。
technique.reforge.flavor_text=魔法修复护甲，如同时间倒流一般。
technique.oil.flavor_text=用注油滑腻目标，使其难以抓手且易燃。
technique.inflict_wounds.flavor_text=直接对目标造成创伤，引发流血。
technique.paralyze.flavor_text=强大的诅咒，能将被诅咒者锁定在原地，持续整个生效时间。
technique.hypnosis.flavor_text=催眠被诅咒者；虽不如完全的精神控制，但仍极为有效。
technique.intoxicate.flavor_text=被诅咒者会如饮酒般陷入醉酒状态。
technique.invisibility.flavor_text=一种能让施法者隐形、使无真实视觉者无法看见的法术。
technique.sleep.flavor_text=被诅咒者会陷入安眠术的沉睡中。
technique.phantasmal_shield.flavor_text=召唤一面幽灵盾牌，可以像实体盾牌一样使用。
