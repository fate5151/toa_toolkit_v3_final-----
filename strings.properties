stat.strength.description=力量决定基础攻击力，影响伤害、攻击使敌人失衡的程度，以及力量对抗（如摔跤、挣扎或武器锁定）。注意：高力量会吸引狼人！
stat.endurance.description=耐力决定了体力和韧性，影响你在不疲劳的情况下持续攻击的能力、承受低伤害攻击的能力，以及穿戴更重盔甲而不筋疲力尽的能力。
stat.agility.description=敏捷决定了平衡和技巧，影响你在做杂技动作时保持稳定脚步的能力、对敌人发动不可格挡的攻击，以及躲避敌人攻击的能力。
