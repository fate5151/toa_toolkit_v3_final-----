enemy_defeated.goblin=哥布林被击倒在地，败了！
enemy_defeated.harpy=哈比从天空坠落，重重摔在地上！\n她被打败了！
enemy_defeated.slime=史莱姆无法维持她的形态！\n她被打败了！
enemy_defeated.wereslut=狼人女停止了战斗！她开始嗅闻你！
enemy_defeated.wereslut_quickshot=狼人女停止了战斗！她似乎很急切！
enemy_defeated.elite_harpy=哈比从天空坠落，激起一片羽毛爆炸！\n她被打败了！
enemy_defeated.unicorn=你击败了独角兽！\n她喘着粗气，但依然鞠躬，承认你的强大！
enemy_defeated.goblin_male=The Goblin is knocked to the ground, defeated\!
enemy_defeated.orc=兽人被击倒了！她擦了擦嘴，咯咯笑了！
enemy_defeated.adventurer=冒险者摔倒在地，屁股朝天！
enemy_defeated.ogre=巨大的食人魔发出一声怒吼轰然倒下，被打败了！胜利如此甜美！
enemy_defeated.beastmistress=黑精灵骑兽师从她的恐猫身上坠落！她被击败了！
enemy_defeated.spider=阿拉克涅跪下了！她被击败了！
enemy_defeated.golem=石像鬼解除了攻击状态！它不再怀有敌意！
enemy_defeated.ghost=幽灵被消灭了！它改变了外貌！
enemy_defeated.bunny=普卡放下了武器！她停止了战斗！
enemy_defeated.angel=天使被击落在地！她被打败了！
enemy_defeated.naga=娜迦在装死！她是……不，她没事。不过，她确实被打败了！
enemy_defeated.quetzal=强大的ケ察尔（羽蛇神）倒在地上！她被打败了！
enemy_defeated.mermaid=美人鱼丢下长矛，搁浅在沙滩上！她被打败了！
enemy_defeated.warlock=术士扔下匕首！她被打败了！
enemy_defeated.giantess=巨女无法被击败！别这样啦。
enemy_defeated.dullahan=无头骑士差点掉了脑袋—但她设法抓住了！她被击败了！
enemy_defeated.wasp=黄蜂女摔落在地，吱吱喳喳地响！她被击败了！
enemy_defeated.doppelganger=你被击败了！等等，呃……不她们被击败了！说些只有你会说的话！
enemy_defeated.persephone=吸血鬼珀耳塞福涅被击败了！
enemy_defeated.helena=吸血鬼海伦娜被击败了！……反正她也没真想赢！
enemy_defeated.minotauress=牛头女把斧头插进地里！她不再敌对了！
enemy_defeated.fire_elemental=火元素变成了石头！她被击败了！
enemy_defeated.ettin=双头巨人伴随着两声巨吼轰然倒下！呃，一声吼叫和一声长长的哀嚎，不过它们被击败了！
enemy_defeated.jester=小丑女的法杖掉落在地！她被击败了！
enemy_defeated.dark_knight=黑暗骑士收剑入鞘！
enemy_defeated.catgirl=猫娘浑身又热又汗！而且肯定是被击败了！
enemy_defeated.tentacle_witch=触手女巫的触手静止不动了！它们被击败了！
enemy_defeated.demon_king=胜利！伟大的魔王被击败了！
