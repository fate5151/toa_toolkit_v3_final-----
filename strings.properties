character.brothel_madam.description=希拉贾姆镇妓院的所有者和经营者，这家机构有着惊人的影响力。她态度严肃，脾气暴躁，但她似乎真心关心她手下的人。她是个精明、有时会精于算计的人物。还有，她的屁股丰满极了。
character.catgirl_salon_girl.description=在隐藏猫娘村的水疗/美容院里工作的一名猫娘。非常友善。喜欢和客人玩耍。
character.catgirl_innkeep.description=在隐藏猫娘村的旅店兼妓馆里工作的一名猫娘，担任旅店老板/老鸨。脚踏实地，待人友善。也会“直接”和客人互动。
character.catgirl_fluffy.description=在隐藏猫娘村的旅店兼妓馆里工作的一名猫娘，是其中的一位卖身女郎。羞怯而性感，有口交癖好……不过她也喜欢干柴烈火的玩法。
character.catgirl_chattenoire.description=在隐藏猫娘村的旅店兼妓馆里工作的一名猫娘，是其中的一位卖身女郎。她声名在外，态度冷淡甚至有些粗鲁，但她的“客人”们却再满意不过了。
character.cultist.description=一名崇拜某位黑暗女神的邪教徒。大概是双性恋。
character.gadgeteer.description=一位奇怪的商人，专门出售各种古怪的“小玩意儿”。有一些有趣的爱好。
character.hiro.description=我们的主人公。关于这位宿命英雄，除了他穿裙子很可爱之外，人们所知甚少。
character.hiro_2.description=他们会去哪？他们会吻谁？没人知道。不过他们很可爱。
character.kylira.description=一个缺乏经验、端庄的精灵，跟他们的乌龟同伴一起旅行，卖蘑菇。对人类「鸡—文化」很着迷。
character.mimic.description=一个神秘的女人（？）假装成一只装着贵重物品的宝箱。实际上，真正的宝藏是里面等着你的黏糊糊的触手肉棒！
character.mouth_fiend.description=一位品味非常独特的贵族小姐。可能会在你嘴里留下糟糕的味道。
character.pink_haired_prostitute.description=一个在妓院里工作的咄咄逼人的娼妓。
character.shopkeep.description=一个在希拉贾姆镇杂货店工作的甜美女孩。可能有个秘密。
character.innkeep.description=希拉贾姆镇的一位旅店老板。接受可爱客人的其他支付方式。如果你听到他们桌子底下传来砰的一声，大概有人在旅馆免费过夜了。
character.vampire_hunter.description=一位强大的恶魔杀手，也在希拉贾姆教堂里照顾亡灵。找不到能装下她大肉棒的裆甲。
character.elf_lady.description=一位神秘的精灵女性，只出现在治愈水池旁，她守护着这些水池。
character.evoker.description=一位古怪的术士，与恶魔嬉戏作伴。
character.adventurer.description=一位年轻的魔剑士，尽管身材矮小，却挥舞着一把巨大的战斧。以傲慢的优越感闻名……还有他独特的床上癖好。
character.beastmistress.description=黑暗精灵是一个秘密的文化，所以人们对他们的整体知之甚少，但敢于冒险前往地表世界的异类是一群形形色色的残忍恶棍。\n\n女猎手，或称兽之女主人，以特别远大的行动范围而闻名，她们骑乘着强大如熊的猫科动物，搜寻着……猎物。
character.brigand.description=人类是分布广泛的地表居民，对什么该进什么洞有着古怪的想法。大多数其他智慧种族都不太喜欢他们，甚至一些非智慧种族也是如此。好的一面是，他们确实能做出极好的奶酪。\n\n强盗们在路上游荡，追寻着生活中的简单乐趣—主要是战利品。
character.bunny.description=普卡以其诡计以及带来好运和厄运而闻名。\n\n就讨债人而言，她看起来足够友好—但那些经常拖欠钱币的人可要遭殃了。
character.centaur.description=半人马以箭术闻名，以对平原的统治而闻名—对某些部落而言是他们的残暴，对另一些则是节制。半人马社会有非常严格的行动准则，而半人马的阳具尺寸……嗯，俗话说“像马一样挂着的”，对吧？\n\n她的箭术令人印象深刻，而且那还不是她唯一的长处。爱好：让牝马眨眼，让美少年变成牝马。
character.unicorn.description=半人马以箭术闻名，以对平原的统治而闻名—对某些部落而言是他们的残暴，对另一些则是节制。半人马社会有非常严格的行动准则，而半人马的阳具尺寸……嗯，俗话说“像马一样挂着的”，对吧？\n\n半人马中有一个稀有品种是独角兽，它对处女/童贞格外着迷。不过，处女们应当注意，尽管有这种吸引力，但它们的行为表明，它们对保护那份童贞没什么兴趣。
character.dryad.description=森林之女。字面意义上的。用她的诡计迷惑森林中的行人—但反过来也可能被迷惑。\n\n愿意将她的果实赠予那些自由献身之人。
character.ghost.description=死者的灵魂有时会徘徊不去。\n\n某个早已灭亡王国的古老皇室—因她的政治婚姻毫无爱情而陷入悲伤的低谷。尽管她的丈夫不情愿地尝试过，却无法忍受她的性爱技巧，最终离她而去，令她心碎—就像她当初把他的屁股操碎一样。
character.gloryhole.description=每个穴都是一次荣光的机会。
character.goblin.description=哥布林就是些哥布林样的小混蛋，对吧？顽皮、精力旺盛，而且常常残忍。哥布林对食物和……乐子有着贪婪的胃口。尽量让它们待在你的视线范围内。\n\n雌性哥布林能够进行一种伪受孕，所以最好别去招惹它们。
character.goblin_male.description=哥布林就是些哥布林样的小混蛋，对吧？顽皮、精力旺盛，而且常常残忍。哥布林对食物和……乐子有着贪婪的胃口。尽量让它们待在你的视线范围内。\n\n雄性哥布林常常害怕雌性哥布林，会让它们优先挑选玩物。
character.golem.description=被赋予生命的石像，是法师极其强大的确凿标志—而且很可能又老又无聊。\n\n如果它们像这个一样，那还得加上「寂寞」。一根魔法导管真的需要那么翘的屁股吗？
character.harpy.description=鹰妖群是有点愚钝的兽人，不过有传言说它们比表面上的通用语水平要聪明。它们是空中掠食者，吞噬小型野禽和地面生物。\n\n如果你曾经不小心绊倒，一屁股坐在鸡毛掸子上—恭喜你，你已经知道这只鹰妖的卧室习惯了。
character.elite_harpy.description=鹰妖群是有点愚钝的兽人，不过有传言说它们比表面上的通用语水平要聪明。它们是空中掠食者，吞噬小型野禽和地面生物。\n\n本能更敏锐的鹰妖往往领导族群，它们既是贪婪的猎手，也是贪婪的配偶。
character.ogre.description=食人魔是体型巨大、野蛮强壮的哥布林类生物—尽管有人认为它们与人类关系更近。食人魔王国曾经很常见，但现在更常见的是单独的食人魔睡在洞穴和林间空地，过着睡觉和杀戮的简单生活。\n\n有些食人魔对体型较小的人形生物有性偏好—这些人形生物最好完全避开食人魔，除非它们想知道一个食人魔大小的皮搋子对一个平民大小的屁眼能干出什么。
character.orc.description=无论你如何分类兽人属于哥布林类还是人形生物，它们都以力量著称。这个地区的兽人尊敬勇敢，鄙视懦弱。\n\n反直觉的是，乌尔卡更喜欢温顺的追求者而非强壮的，不过她也不会因为一个勇敢、强壮但温柔的男孩在床上吃饼干就把他踢下床。
character.slime.description=史莱姆嘛，是由有知觉的黏液构成的。不过，它们体内可见的核心必须保持完整才能维持意识。\n\n蒂雅是一种温和的生物，通常以丰满的曲线女性形态出现。如果你有刻薄心性，最好避开她，除非你想遭遇最可耻的下场。
character.spider.description=关于遗迹中的蜘蛛女，除了她极其危险和恶毒之外，所知甚少。她的数千幼崽本身就是一支军队—进入遗迹，后果自负。
character.wereslut.description=狼人女究竟是化为人形的狼，还是化为狼形的人，亦或是一种两者皆可的兽人生物，这点尚不确定。但她们野兽般的力量与敏捷，加上锋利的利爪，使她们极其危险。\n\n外表像村庄图书馆员的这位狼人女，偏爱和人类男孩交配，特别是强壮的那种……后果惨烈，后穴会被撑得裂开。
character.wereslut_quickshot.description=狼人女究竟是化为人形的狼，还是化为狼形的人，亦或是一种两者皆可的兽人生物，这点尚不确定。但她们野兽般的力量与敏捷，加上锋利的利爪，使她们极其危险。\n\n年轻且经验不足，但力量惊人，这位狼人女只有一个目标：交配。她对伴侣并不太挑剔。
character.lupa_werewolf.description=狼人女究竟是化为人形的狼，还是化为狼形的人，亦或是一种两者皆可的兽人生物，这点尚不确定。但她们野兽般的力量与敏捷，加上锋利的利爪，使她们极其危险。\n\n然而，有些狼人女相当温顺且爱玩。她们的性欲有时会引发不幸的情况，但她们并无恶意。
character.angel.description=一位侍奉着古老、早已被遗忘的女神的神圣造物。她的女神所掌管或曾经掌管的领域尚不确定，但她的号角有多长却是众所周知的。
character.naga.description=娜迦是一种特别凶残的生物。它会根据心情，要么立刻勒死对手，要么吞噬或玷污对方。\n\n即使是普通的娜迦也是极其危险的敌人—力量强大、狡猾、无声、顽强。若低估她们的施虐癖，后果自负。
character.quetzal.description=娜迦是一种特别凶残的生物。它会根据心情，要么立刻勒死对手，要么吞噬或玷污对方。\n\n据说有一位远古神明，是早已灭绝的「克查尔」亚种的太古娜迦。尽管她极少从修赫山山顶下来，但远近闻之丧胆。有传言说她需要处女祭品—总是男性，且偏好面容柔和的，但没人知道那些祭品最终变成了什么。
character.mermaid.description=美人鱼—美丽而神秘，一种拥有人类身体和鱼鳍的水生生物。她们以诱人的容貌和歌声引诱水手闻名，但水手们之后会怎样无人知晓。\n\n已知雌性美人鱼会产卵—但她们在哪里产卵却无人知晓。
character.warlock.description=一位相当强大的术士—除了她习惯玩弄男人之外，对她知之甚少。
character.giantess.description=一个非常、非常高大的女人。
character.wasp.description=黄蜂女以其个人主义、掠夺性行为以及生殖周期而闻名，这与它们体型较小、智能较低的表亲非常相似。强烈建议避开它们的蜇刺，即使你一直好奇甲壳的触感如何。
character.dullahan.description=无头骑士……因其非人的力量和恐怖的外表而令人恐惧。传言说，当她的头与身体分离时，她那充满欲望的身体会按照最黑暗的冲动行事……而且对男女不加区分。对于被这个无头幽灵抓住的人来说，他们很快就会明白，她还有另一个更可怕的「头」。尤其是当他们与它恐怖地「相识」，并被它不舒服地「打开」时。
character.alraune.description=一种有着迷人人类外表的植物怪物，以用诱人香气引诱旅行者而闻名，就像某些食肉植物一样，其目的是为了营养和繁殖。
character.doppelganger.description=一种模仿其猎物的生物。除此之外一无所知。
character.persephone.description=一位严厉且施虐成性的吸血鬼女士，她常常受其创造者海伦娜的摆布。
character.helena.description=一个活泼、狂热的吸血鬼女性，对她的保护对象珀耳塞福涅倾注着爱意与欲望。
character.minotauress.description=一位极其强大、表面礼貌、傲慢、野兽般的防御者。能把任何弯曲的道路变直，无论是迷宫还是别的什么。
character.fire_elemental.description=一个烈焰之灵，只关心如何传播它的火焰。历经数亿年凝聚力量，它们拥有人类般的智慧，但几乎不关心人类的脆弱。极其危险。
character.ettin.description=食人魔是体型庞大、蛮力惊人的哥布林类生物—尽管有些人认为它们与人类的关系更为密切。食人魔王国曾经很常见，但现在更常见的是单个食人魔在洞穴和林间空地上睡觉，过着简单的、只有睡眠和杀戮的生活。\n\n双头食人魔，或称双头巨人，以彼此之间的争吵而闻名。这是许多冒险者的救命稻草，因为它们可能无法决定该给冒险者带来何种可怕的命运。
character.kitsune.description=狐族兽人以华丽的风格和活泼的个性而闻名，人们很容易低估她们的狡猾和冷酷。有传言说她们具有双重性格，对敌人可以冷酷无情、施虐成性。但是，一个胸大臀肥、讲究时尚的女人，又能恐怖到哪里去呢？
character.jester.description=神秘的小丑女。她到底是怎么回事？
character.dark_knight.description=黑暗骑士，令人畏惧的魔王仆人。小心。
character.dork_knight.description=那个呆子骑士，魔王令人畏惧（？）的仆人兼腐女。小心她的CP配对。
character.cargirl.description=一只性格非常轻浮贪玩的猫娘。传闻她的咬人比喵叫更厉害，但她大多只是喜欢纵情享乐。
character.tentacle_witch.description=一种极其特殊的黑暗艺术大师：触手占卜术，即使用触手进行占卜。事实证明，当你求问触手预测未来时，未来永远是「触手」。讨厌星期一，喜欢以难以捉摸的方式玩弄男孩。
character.demon_king.description=「魔王」。拥有着毁灭与诱惑的庞大力量，自成一类。英雄们当心。似乎同时拥有魅魔与龙的血统。
character.lemon_king.description=「柠檬王」。拥有着毁灭与诱惑的庞大力量，自成一类（柑橘类）。英雄们当心。似乎同时拥有魅魔、龙以及……柠檬（？）的血统。
character.nurse.description=一位在乡下精子库工作的护士，精子库既是精液储存库，也是她自制奶昔的供应点。她表面开朗，急于向冒险者兜售她的商品。她作为精子库护士兼女店主的双重角色，当然纯属巧合。\n\n概不退款。
character.merrybelle.description=一位神秘的魅魔。
character.wereslut.anatomy=她们的阳具如同犬科动物，根部附近有一个球状、可膨胀的结锁，确保完全授精，并让不幸接受她交配的对象彻底丧失尊严。由此产生的拉伸可能部分永久化，所以好奇者最好当心。
character.kitsune.anatomy=她们的阳具如同犬科动物，根部附近有一个球状、可膨胀的结锁，确保完全授精，并让不幸接受她交配的对象彻底丧失尊严。由此产生的拉伸可能部分永久化，所以好奇者最好当心。还有一些小刺用来确保雌性开始排卵。这是一个危险的组合，尤其是考虑到它们的本性。
character.catgirl.anatomy=她的阳具是猫科动物的，带有小刺用来确保雌性开始排卵。这需要一个适应过程，但除了表面伤害和像发情猫一样大声尴尬的呻吟外，造成严重损伤的风险很小。
character.harpy.anatomy=她们的阳具惊人地像哺乳动物，甚至类似人类，只是异常长，并被一层可怕的包皮包裹。按人形生物的标准来说，它们不太卫生，所以口交最好留给勇敢和愚蠢的人。她们的阴毛实际上是羽毛，所以交配就像和鸡毛掸子发生了意外。
character.centaur.anatomy=她们的阳具本质上是马科，且骄傲地挺立。因此不建议人类与半人马交配，因为存在切实的危险，而且对士气也不好。想象一下牝马眨动的穴口，就能全面理解为什么这是个坏主意。
character.giantess.anatomy=崇拜她本身的宗教有一个派别，专门崇拜它，并且有充分的理由。
character.ghost.anatomy=她们的生殖器有选择性地无形，可以与现世互动。生前尺寸对于人类来说算大，死后这一点丝毫未变。即使在隐形时也能变得可触碰，因此建议睡觉时闭上嘴。
character.goblin.anatomy=哥布林类的繁殖周期无法研究，最好形容为「香蕉裤」。避免。
character.naga.anatomy=它们的阳具是多根的。不要接触。
character.ogre.anatomy=参见：平均长度和周长。冒险者被警告远离任何发情的食人魔，除非他们想要两英尺长的食人魔肉棒插进屁股，而且食人魔并不挑剔。
character.orc.anatomy=它们的阳具按人类标准非常大，并在龟头附近布满小突起，旨在迫使兽人排卵，或让人类重新考虑人生选择。饱满沉重的睾丸并非装饰；射精保证致孕，除非从肛门注入。
character.wasp.anatomy=它们的阳具是几丁质的，产卵器会下蛋。离远点。
character.fire_elemental.anatomy=它们的阳具对人类而言相当标准，只是比人体温度更高，但它们的睾丸，以及较小程度上的阴茎，在充满精液并接近射精时会变得过热，由此产生的超热精液可能给毫无准备的情人带来讨厌的惊喜。
character.wereslut.fetishes=它们更喜欢给予而非接受，喜欢强壮男性，并享受后入式和后入式伴侣。
character.catgirl.fetishes=他们喜欢各种玩法。
character.harpy.fetishes=他们喜欢口交，尽管这在鹰妖群中并不常见。
character.ghost.fetishes=因为缺乏经验，他们只从给予（爱）的角度看待性爱，但实际偏好并不那么强烈。
character.goblin.fetishes=他们喜欢交替使用某人的后穴和嘴巴。
character.naga.fetishes=他们明显更偏好给予。
character.orc.fetishes=They vastly prefer giving.
character.fire_elemental.fetishes=他们因为发热而性奋。
character.adventurer.fetishes=他们既喜欢给予也喜欢接受。
character.brigand.fetishes=他们更喜欢给。
character.bunny.fetishes=他们更喜欢支配。
character.dark_knight.fetishes=他们极其喜欢支配。
character.doppelganger.fetishes=他们的偏好可塑性强。
character.dullahan.fetishes=他们喜欢温柔的性。他们的身体（没有头部）更喜欢粗暴的性。
character.alraune.fetishes=他们更喜欢播撒种子，但也不介意接受额外的营养。
character.ettin.fetishes=他们偏爱更小的伴侣。一个头偏爱口交，另一个头偏爱肛交。不清楚哪个总是说谎。
character.kitsune.fetishes=他们偏好健壮的男性，且性欲旺盛。
character.gadgeteer.fetishes=他们喜欢支配和使用玩具。
character.golem.fetishes=除了执行分配的任务外，他们没有其他偏好。
character.helena.fetishes=淑女从不泄露秘密。
character.hiro.fetishes=我们的英雄偏好什么呢……？
character.jester.fetishes=他们的偏好是个谜。
character.kylira.fetishes=偏好温柔、轻柔的性爱。
character.mimic.fetishes=偏好不敏锐的人。
character.mermaid.fetishes=他们偏好适婚年龄的男人。
character.minotauress.fetishes=他们偏好体型较小的搭档，以及支配和捉迷藏。
character.mouth_fiend.fetishes=他们有轻微的口交癖好。
character.null.fetishes=他们什么都不偏好，因为他们一无所有。
character.ogre.fetishes=他们偏好体型较小的搭档。
character.persephone.fetishes=他们偏好女人和支配。
character.quetzal.fetishes=他们更喜欢祭品。
character.slime.fetishes=他们没有性偏好，通过有丝分裂繁殖，但也不反对性行为。
character.spider.fetishes=他们更喜欢产卵和女性化的男孩。
character.centaur.fetishes=他们没有强烈的偏好。
character.unicorn.fetishes=他们只对处女感兴趣。
character.warlock.fetishes=他们极其偏好女性化的男孩，并且在性交时使用魔法。
character.wasp.fetishes=他们更喜欢产卵。
character.womp_guy.fetishes=他们就是个变态。喜欢可爱的男孩子。
