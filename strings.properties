outcome.victory=胜利—敌人已无法或不愿继续战斗，通常因其生命值降为0。
outcome.defeat=落败—你已无法继续战斗，因为你的生命值降为0。
outcome.knot_anal=结锁（肛门）—你们以某种方式被锁在一起，导致无法战斗。
outcome.knot_oral=结锁（口部）—你们以某种方式被锁在一起，导致无法战斗。
outcome.surrender=投降—你已向敌人投降。
outcome.rescue=救援 - 你已经投降，并让别人来处理局面。
outcome.satisfied_anal=满足 - 敌人已经满足，不会再战斗。
outcome.satisfied_oral=满足（口交） - 敌人已经（通过口交）满足，不会再战斗。
outcome.submission=被支配 - 敌人因变得顺从，不再愿意战斗。
outcome.death=死亡 - 你已经被杀死，因为你死了，无法再战斗。
outcome.pacifist=和平解决 - 你已避免冲突，因为你的对手不再想战斗，而是想和平解决问题。
outcome.drunk=醉酒 - 你喝醉了，完全没有战斗状态。
outcome.drunk_other=醉酒敌人 - 你的敌人正在醉酒，不适合战斗。
outcome.groin_kick=卵巢震荡 - 你的卵巢被搅乱了。哎呀。
