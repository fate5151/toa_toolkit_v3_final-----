mutation.trudy_casts_titan_strength_on_you=特鲁迪对你施放了泰坦神力！「表现得更好些！」
mutation.urka_offers_to_help=乌尔卡主动提出帮忙！「哼。要我处理这个吗？」
mutation.alma_offers_to_help=阿尔玛主动提出帮忙！「让我来处理。」
battlescreen.results=Results\: 
battlescreen.stance_widget_tooltip=这是你当前的姿态。大多数技能会改变你的姿态，对手使用的某些技能也会改变你的姿态。你的姿态决定了你在任何时刻可用的技能，对手的姿态也如此，反之亦然。
battlescreen.skill_text.next=下一个：
battlescreen.skill_text.tooltip=这是你对手下一步行动的显示。你的感知越高，这个显示就越频繁，并且会显示更多信息，包括他们的下一个姿态和下一个技能。
battlescreen.outcomes.tooltip=这是这场战斗的可能结果。根据战斗者的状况，你可能会获得其中任何一个。
battlescreen.lust_widget_tooltip=当前欲火：{0}%\n\n这代表欲火。你和对手进行的性活动会增加欲火，而高潮和分散注意力可以降低它。更高的欲火会导致兴奋上升更快，并降低你的自控能力。
battlescreen.mana_widget_tooltip=当前魔力储备：{0}\n\n这代表你的魔力储备。某些技能允许你从该储备中抽取魔力到你的活跃魔力池中。否则，当你有机会休息时，这将用于补充你的活跃魔力池。
battlescreen.missile_display_tooltip=这代表你使用弓的弹药供应。当你没有剩余弹药时，你不能再使用弓攻击。
battlescreen.weapon_display_tooltip.start=武器用于大多数攻击，某些攻击需要武器，也用于招架。随着对武器的握持松动，它会变得更不有效，最终会被缴械。
battlescreen.weapon_display_tooltip.stats=当前提供的伤害：{0}\n剩余握持：{1}
battlescreen.armor_tooltip.shield=可格挡的攻击会被盾牌部分或完全格挡，前提是对手使用了带有格挡成分的对应技能。这会损耗盾牌；盾牌受损后效果降低，最终会碎裂。
battlescreen.armor_tooltip.armwear=只有特定的针对手腕的攻击才会击中此处，但击中手腕会削弱对武器的握力，最终导致缴械。
battlescreen.armor_tooltip.underwear=低高度的攻击击中此处。某些技能可以用来移除内裤。
battlescreen.armor_tooltip.covers_bottom=低高度的攻击击中此处。
battlescreen.armor_tooltip.covers_top=中高度和高度的攻击击中此处，因此保持此处的防护尽可能强大至关重要。
battlescreen.armor_tooltip.footwear=只有特定的针对脚部的攻击才会击中此处，但击中脚部会破坏平衡，最终导致绊倒。
battlescreen.armor_tooltip.headgear=只有特定的针对头部的攻击才会击中此处，但击中头部会导致意识模糊，头部承受的伤害越大，意识模糊越严重。
battlescreen.armor_tooltip.stats=当前提供的伤害吸收：{0}\n当前耐久度：{1}
battlescreen.sperm_popup_x_ml={0} dz
battlescreen.grapple_display_tooltip=这表明你当前的擒抱状态（{0}）。 \n\n状态条越靠右表示你控制对手，越靠左表示对手控制你。\n\n赢得擒抱回合通常会使擒抱指示器向右移动，输掉则向左移动。 \n\n可用的技巧取决于你的擒抱姿态和擒抱指示器的等级。
