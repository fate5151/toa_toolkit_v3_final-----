tutorial.stances=当你使用一个技能后，你将进入该技能对应的姿态，姿态会以图标形式显示在技能名称旁。进入新姿态后，你将能够使用新的技能。你可以使用一个技能回到原先的姿态，甚至切换到另一个之前无法使用的姿态。
tutorial.health_and_stamina_degradation=当你的生命值或体力值降低时，你的属性值会累积减值。要查看这些减值，请将光标悬停在角色肖像上。生命条和体力条旁边的图标也会提示出现了减值。恢复生命值或体力值以移除这些减值。
tutorial.grapples=当你与对手进入缠斗状态时，你可用的技能将受限于体力值和当前的缠斗状态（如上所示）。与敌人挣扎或缠斗可以改善你的缠斗状态—但他们也会使用技能产生相反的效果！
tutorial.knockdown=当你的体力值或稳定性耗尽时，你会摔倒在地！试图起身时，你可以经过多个姿态过渡，包括手膝跪地和跪立姿态，而你可用的技能将受限于当前的体力值和稳定性。
tutorial.disarm=当你的武器握持度耗尽时，你的武器会被缴械！被缴械的武器会出现在你的物品列表中，可以通过"使用"它重新装备。
