quest.description.innkeep.20=你为了换一天住宿，被旅店老板操了。
quest.description.innkeep.10=你为了换一天住宿，给旅店老板口交了。
quest.description.madam.10=你已经向妓馆老鸨介绍过自己了。
quest.description.madam.20=妓馆老鸨已经给你提供了一份工作。
quest.description.madam.30=你已经从妓馆老鸨那里接下了悬赏，去怪物镇找一个闹事者。
quest.description.madam.40=你已经替妓馆老鸨抓住了那个闹事者。
quest.description.madam.50=你已经把闹事者交给了妓馆老鸨，并拿到了报酬。你正在等她下一个悬赏。
quest.description.madam.60=你听妓馆老鸨说，她还有另一个悬赏要给你，但你还没接下。
quest.description.madam.70=你已经从妓馆老鸨那里接下了调查狼人女的悬赏。她想让你尽可能追踪到关于狼人女威胁的信息。
quest.description.madam.80=你替妓馆老鸨发现了一只狼人女。她要你确认她对狼人女性器官的猜测。
quest.description.madam.90=你替妓馆老鸨确认了狼人女奇特的器官构造。她要你追查这种威胁的来源。
quest.description.madam.100=你替妓馆老鸨发现了狼人女威胁的来源。她要你弄到一些她们的精液，以便制作疫苗。
quest.description.madam.110=你替妓馆老鸨收集了一些狼人女的精液。
quest.description.madam.120=你把狼人女的样本交还给妓馆老鸨，她奖励了你，不过她说还有另一份报酬稍后奉上。
quest.description.madam.130=你目睹了妓馆老鸨……从一只驯服的狼人女身上……提取……更多血清。好吧。
quest.description.madam.140=你已经替妓馆老鸨完成了两项任务，正在等第三项。
quest.description.brothel_madam_request.10=你向妓馆老鸨提出，作为赏金的额外奖励，让她把屁股给你享用。
quest.description.brothel_madam_request.20=你向妓馆老鸨提出，作为赏金的额外奖励，让她给你当椅子坐。
quest.description.cultist.10=你遇到了那群古怪的邪教徒。
quest.description.cultist.20=你被黑暗女神容器所释放的暗影注入了种子。
quest.description.dullahan.10=你遇见了无头骑士。
quest.description.dullahan.20=你偷走了无头骑士的脑袋，然后把它扔掉了。
quest.description.dullahan.30=你成了无头骑士的女友。
quest.description.mermaid.10=你遇到了一条美人鱼，并且关系友好，可以安全地通过她的水域。
quest.description.mermaid.20=你遇到了那条美人鱼，并且知道如果你再次进入她的水域，她一见你就会攻击。
quest.description.mermaid.30=美人鱼把她的卵产在了你体内。你肚子里全是卵，腹中挤压般的疼痛时刻提醒着你。
quest.description.mermaid.40=美人鱼的卵已经在你的肚子里孕育了数日—你疼痛、痉挛的肠道感觉就像分娩阵痛。你完全怀孕了。
quest.description.mermaid.50=美人鱼的卵开始孵化了—如果你不尽快到一片水域里把它们生出来，你担心自己会爆炸。你要当妈妈了！
quest.description.mermaid.60=美人鱼的卵正在孵化！
quest.description.mermaid.70=你已经孵化了美人鱼的卵。哎呀。
quest.description.mouth_fiend.10=妓馆老鸨警告过你不要对姑娘们太粗暴。
quest.description.mouth_fiend.20=妓馆老鸨已经禁止你进入并威胁了你。
quest.description.kitsune.10=你见过狐妖了。
quest.description.kitsune.20=你见过（并惹恼了）狐妖。
quest.description.kitsune.30=你见过（并结交了）狐妖。
quest.description.ogre.10=你见过一个食人魔。
quest.description.orc.110=你是乌尔卡兽人的宠物了。
quest.description.orc.100=兽人乌尔卡与你共享营地。
quest.description.orc.20=你遭遇了一只兽人并表现得很怯懦。
quest.description.orc.10=你遭遇了兽人乌尔卡并表现得体。
quest.description.quetzal.40=你因击败了修赫山之主羽蛇女神而获得了奖赏。
quest.description.quetzal.30=你击败了修赫山之主羽蛇女神。
quest.description.quetzal.20=你看到了修赫山之主—她是一条巨大的娜迦！
quest.description.quetzal.10=你听说了修赫山之主的事。
quest.description.spider.10=你从那些蜘蛛女盘踞的遗迹中幸存了下来。
quest.description.spider.20=蜘蛛女在你体内产卵了！
quest.description.spider.30=你体内那些蜘蛛卵开始蠢动了！
quest.description.spider.40=你体内那些蜘蛛卵快要孵化出来了！
quest.description.spider.50=蜘蛛卵正在孵化！
quest.description.spider.60=你生出了蜘蛛女的幼崽！
quest.description.trudy.10=你遇到了另一个冒险者—特鲁迪。
quest.description.trudy.20=你挫败了特鲁迪的背叛，而他则代替你被野兽干了一顿。
quest.description.trudy.30=你被特鲁迪欺骗，并被野兽干了。
quest.description.trudy.40=你和特鲁迪战斗过。
quest.description.trudy.50=你让特鲁迪成为了你的旅伴。
quest.description.trudy.60=你和旅伴特鲁迪的关系变得亲密了。
quest.description.trudy.70=你和你的旅伴特鲁迪变得非常亲密，他还教了你一些他的技能。
quest.description.warlock.10=你看到了幽灵小镇里那座诡异的庄园。
quest.description.warlock.20=你参观过幽灵镇的那座奇怪庄园。
quest.description.warlock.30=你被幽灵镇的黑暗法师弄得不举了。
quest.description.warlock.40=你被幽灵镇的黑暗法师变成了一个肛交荡妇。
quest.description.warlock.50=你被幽灵镇的黑暗法师变成了一个肉棒爱好者。
quest.description.wasp.10=你被黄蜂女产卵了！
quest.description.wasp.20=你体内的黄蜂卵开始躁动了！
quest.description.wasp.30=你体内的黄蜂卵快孵化了！
quest.description.wasp.40=黄蜂女的卵正在孵化！
quest.description.wasp.50=你已经生下了黄蜂女的幼崽！
quest.description.warlock_portal.10=你已经开始与阿尔玛一起训练，学习传送魔法。
quest.description.warlock_portal.20=阿尔玛正在用她的传送门教你传送魔法……以及友谊的真谛。
quest.description.warlock_portal.30=阿尔玛已经教会了你传送魔法……但她决定把自己的个人传送门保持开启。
quest.description.witch.20=你从森林女巫那里获得了女神的祝福。
quest.description.witch.10=你遇到了森林女巫。
quest.description.golem.10=你觉醒了一个魔法石像鬼。
quest.description.slime.10=你遇到了史莱姆蒂雅。
quest.description.slime.20=你摧毁了史莱姆蒂雅的核心。
