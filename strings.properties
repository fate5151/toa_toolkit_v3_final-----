battle_screen.health_bar_tooltip=这代表你的健康值。健康值越高会提升你的属性，特别是力量、敏捷和耐力，而健康值低则会降低它们。来自攻击和某些状态效果的伤害会减少健康值。
battle_screen.stamina_bar_tooltip=这代表你的耐力值。耐力值越高会提升你的属性，特别是力量和敏捷，而耐力值低则会降低它们。使用技能消耗耐力，某些敌人攻击和状态效果也会减少耐力。通过使用休息技能恢复耐力。
battle_screen.balance_widget_tooltip=这代表你的平衡值。平衡值越低，你越容易摔倒。使用不稳定的技能会减少平衡值，受到强力打击也会。通过使用稳定技能恢复平衡。
battle_screen.mana_bar_tooltip=这代表你可用于施法的法力值。如果没有足够的法力，法术会失效。
battle_screen.arousal_bar_breakdown=当前兴奋阶段\: {0}\n下一个\: {1}
battle_screen.arousal_bar_tooltip=这条条代表兴奋度。随着它填满，兴奋水平通过几个阶段增加；一旦完全填满，会导致高潮，这将使有能力的角色产生高潮和射精。
battlescreen.this_will_cause_you_to_collapse=这将导致你崩溃！
battlescreen.this_will_cause_you_to_lose_your_footing=这将让你失去立足之地！
